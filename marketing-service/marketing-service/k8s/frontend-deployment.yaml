apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-frontend
  namespace: marketing
  labels:
    app: marketing-frontend
    version: IMAGE_TAG
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketing-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: marketing-frontend
        version: IMAGE_TAG
    spec:
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: frontend
          image: ECR_REGISTRY/marketing-frontend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
              protocol: TCP
          env:
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: marketing-config
                  key: API_BASE_URL
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
