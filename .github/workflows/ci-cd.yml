name: CI Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Repo checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ✅ Step 3: Debug (yeh tumne bola add karna)
      - name: Debug files
        run: ls -R

      # Step 4: Install dependencies
      - name: Install dependencies
        run: pip install -r backend/requirements.txt   # 👈 baad me path change karenge agar needed

      # (optional) Step 5: Run app/test
      - name: Run app
        run: echo "Build successful"
