name: CI/CD Pipeline — Marketing Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_IMAGE: marketing-backend
  FRONTEND_IMAGE: marketing-frontend
  EKS_CLUSTER: marketing-cluster
  K8S_NAMESPACE: marketing

jobs:
  # ============================================================
  # Job 1: Lint & Test
  # ============================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        working-directory: backend
        run: ruff check app/ main.py

      - name: Format check with Black
        working-directory: backend
        run: black --check app/ main.py

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ============================================================
  # Job 2: Build & Push Docker images to AWS ECR
  # ============================================================
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    outputs:
      backend-image-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-image-tag: ${{ steps.meta-frontend.outputs.tags }}
      image-tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        id: meta-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.run_id }}
            GIT_SHA=${{ github.sha }}

      - name: Build & push frontend image
        id: meta-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Summarize pushed images
        run: |
          echo "### Docker Images Pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "- Backend:  ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.sha_short }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.sha_short }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Job 3: Deploy to Kubernetes (EKS)
  # ============================================================
  deploy:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Create/update Kubernetes namespace
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml \
            | kubectl apply -f -

      - name: Create ECR image pull secret
        run: |
          kubectl create secret docker-registry ecr-pull-secret \
            --docker-server=${{ env.ECR_REGISTRY }} \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password --region ${{ env.AWS_REGION }}) \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Substitute image tags in K8s manifests
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }}
          sed -i "s|IMAGE_TAG|${IMAGE_TAG}|g" k8s/backend-deployment.yaml
          sed -i "s|IMAGE_TAG|${IMAGE_TAG}|g" k8s/frontend-deployment.yaml
          sed -i "s|ECR_REGISTRY|${{ env.ECR_REGISTRY }}|g" k8s/backend-deployment.yaml
          sed -i "s|ECR_REGISTRY|${{ env.ECR_REGISTRY }}|g" k8s/frontend-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/ --namespace=${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/marketing-backend  --namespace=${{ env.K8S_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/marketing-frontend --namespace=${{ env.K8S_NAMESPACE }} --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get pods      --namespace=${{ env.K8S_NAMESPACE }}
          kubectl get services  --namespace=${{ env.K8S_NAMESPACE }}
          kubectl get ingress   --namespace=${{ env.K8S_NAMESPACE }}

      - name: Deployment summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Cluster:   ${{ env.EKS_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          echo "- Namespace: ${{ env.K8S_NAMESPACE }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image tag: ${{ needs.build-and-push.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY
