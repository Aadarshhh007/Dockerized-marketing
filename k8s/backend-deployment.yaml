apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-backend
  namespace: marketing
  labels:
    app: marketing-backend
    version: IMAGE_TAG
spec:
  replicas: 2
  selector:
    matchLabels:
      app: marketing-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # Zero-downtime deployment
  template:
    metadata:
      labels:
        app: marketing-backend
        version: IMAGE_TAG
    spec:
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: backend
          image: ECR_REGISTRY/marketing-backend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: marketing-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: marketing-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
